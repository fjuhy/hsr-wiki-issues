name: 새 문서 작성 요청
description: 아직 없는 설정/세계관 문서를 요청합니다.
title: "[문서 요청] "
labels: ["document-request", "agent-review"]
body:
  - type: input
    id: title
    attributes:
      label: 작성 원하는 문서명
      description: 만들고 싶은 문서 이름을 정확히 적어 주세요.
      placeholder: "예: 엘리오"
    validations:
      required: true
  - type: input
    id: aliases
    attributes:
      label: 다른 표기 또는 별칭
      description: 영문명, 띄어쓰기 없는 표기, 같은 인물의 다른 이름이 있으면 적어 주세요.
      placeholder: "예: Elio, 운명의 노예"
    validations:
      required: false
  - type: dropdown
    id: page_type
    attributes:
      label: 문서 유형
      options:
        - 인물
        - NPC
        - 세력
        - 조직
        - 장소
        - 세계
        - 운명의 길
        - 에이언즈
        - 개념
        - 사건
        - 기록/용어
    validations:
      required: true
  - type: textarea
    id: brief_description
    attributes:
      label: 간단한 설명
      description: 요청한 문서가 무엇을 다루는지 2~4문장으로 적어 주세요.
      placeholder: |
        예: 엘리오는 스텔라론 헌터와 관련된 인물로 언급되는 존재입니다.
        현재 공개 문서에서는 역할과 관련 언급을 한곳에서 보기 어렵습니다.
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 필요한 이유
      description: 왜 독립 문서가 필요하다고 보는지, 기존 문서의 어느 부분과 연결되는지 적어 주세요.
      placeholder: |
        예: 스텔라론 헌터, 카프카, 은랑 문서와 연결되는 설정 축이 있어 별도 정리가 필요합니다.
    validations:
      required: true
  - type: textarea
    id: official_evidence
    attributes:
      label: 공식 근거
      description: HoYoWiki 링크, 게임 본편 임무/대사 위치, 게임 내 자료실, 공식 한국어 영상 링크를 적어 주세요.
      placeholder: |
        - HoYoWiki:
        - 게임 본편:
        - 공식 영상/자료실:
    validations:
      required: true
  - type: textarea
    id: reference_sites
    attributes:
      label: 참고 사이트/자료
      description: 자동 검토가 비교할 수 있는 참고 링크나 자료명을 적어 주세요. 비공식 사이트는 참고용으로만 사용됩니다.
      placeholder: |
        - 참고 링크:
        - 관련 문서:
        - 검색 키워드:
    validations:
      required: true
