name: 검색 오류
description: 자동완성이나 본문 검색 결과 문제를 제보합니다.
labels: ["search", "agent-review"]
body:
  - type: input
    id: query
    attributes:
      label: 검색어
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대한 결과와 실제 결과
    validations:
      required: true
